name: Build and Deploy Jekyll

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and deploy'
        required: false
        default: 'main'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jekyll
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: jekyll

      - name: Cache Jekyll build
        uses: actions/cache@v4
        with:
          path: jekyll/.jekyll-cache
          key: jekyll-cache-${{ hashFiles('jekyll/**/*.md', 'jekyll/**/*.html', 'jekyll/_config.yml') }}
          restore-keys: jekyll-cache-

      - name: Build Jekyll site
        run: bundle exec jekyll build -d ../_site_final/jekyll
        env:
          JEKYLL_ENV: production

      - name: Copy helper folder
        run: cp -r ../helper ../_site_final/helper

      - name: Copy pubky-post.js
        run: cp ../pubky-post.js ../_site_final/pubky-post.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site_final

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}jekyll
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
