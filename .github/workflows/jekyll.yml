name: Build and Deploy Jekyll

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jekyll
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: jekyll

      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl /abc-team-hackathon-prague/jekyll
        env:
          JEKYLL_ENV: production

      - name: Create subfolder structure
        run: |
          mkdir -p ../_site_final/jekyll
          cp -r _site/* ../_site_final/jekyll/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site_final

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}jekyll
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
